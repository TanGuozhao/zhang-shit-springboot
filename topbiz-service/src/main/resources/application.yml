spring:
  application:
    name: topbiz-service
  session:
    store-type: none
    timeout: 2h
server:
  port: 8080
  servlet:
    session:
      cookie:
        name: TOPBIZSESSION
        http-only: true
        same-site: lax
shiro:
  loginUrl: /api/topbiz/auth/login
  successUrl: /api/topbiz/platform/overview
  unauthorizedUrl: /error/403
  userNativeSessionManager: false
topbiz:
  auth:
    public-base-url: http://localhost:8080
    oauth-state-ttl: 10m
    qq:
      enabled: true
      mock-enabled: true
      client-id: qq-demo-client-id
      client-secret: qq-demo-client-secret
      authorize-url: https://graph.qq.com/oauth2.0/authorize
      scope: get_user_info
      default-avatar-url: https://cdn.example.com/avatar/qq.png
    wechat:
      enabled: true
      mock-enabled: true
      client-id: wx-demo-appid
      client-secret: wx-demo-secret
      authorize-url: https://open.weixin.qq.com/connect/qrconnect
      scope: snsapi_login
      default-avatar-url: https://cdn.example.com/avatar/wechat.png
  orchestration:
    repository-type: memory
    jdbc:
      driver-class-name: com.mysql.cj.jdbc.Driver
      table-name: topbiz_orchestration_execution
      initialize-schema: true
      maximum-pool-size: 8
      connection-timeout: 3s
  remote:
    user-service:
      base-url: http://localhost:8081
    message-service:
      base-url: http://localhost:8082
    log-service:
      base-url: http://localhost:8083
management:
  endpoints:
    web:
      exposure:
        include: health,info
